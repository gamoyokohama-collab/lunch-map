<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>営業おすすめランチ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --red:    #D93B2B;
      --red2:   #B02E1F;
      --yellow: #F5C842;
      --bg:     #F7F3EE;
      --white:  #FFFFFF;
      --dark:   #1C1410;
      --gray:   #7A6F68;
      --border: #E2D9D0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100dvh;
    }

    /* ヘッダー */
    header {
      background: var(--red);
      padding: 14px 16px 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    header .label {
      font-family: 'Oswald', sans-serif;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.65);
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    header h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.04em;
      line-height: 1;
    }
    header h1 span {
      color: var(--yellow);
    }
    .header-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }
    .total-count {
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      background: rgba(0,0,0,0.2);
      border-radius: 20px;
      padding: 3px 10px;
      margin-bottom: 2px;
    }

    /* 検索バー */
    .search-wrap {
      padding: 10px 14px 0;
      background: var(--red);
    }
    .search-wrap input {
      width: 100%;
      padding: 9px 14px;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,0.18);
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }
    .search-wrap input::placeholder { color: rgba(255,255,255,0.55); }

    /* フィルターバー */
    .filter-bar {
      display: flex;
      gap: 6px;
      padding: 10px 14px;
      overflow-x: auto;
      background: var(--red);
      scrollbar-width: none;
      padding-bottom: 12px;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-btn {
      flex-shrink: 0;
      background: rgba(255,255,255,0.15);
      border: 1.5px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.85);
      border-radius: 20px;
      padding: 5px 13px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-btn.active {
      background: var(--yellow);
      border-color: var(--yellow);
      color: var(--dark);
      font-weight: 700;
    }

    /* カウント */
    .result-bar {
      padding: 10px 16px 4px;
      font-size: 11px;
      color: var(--gray);
      letter-spacing: 0.04em;
    }

    /* リスト */
    .shop-list {
      padding: 4px 12px 80px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* カードボタン */
    .shop-card {
      background: var(--white);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      align-items: stretch;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: transform 0.12s, box-shadow 0.12s;
      -webkit-tap-highlight-color: transparent;
      border: 1px solid var(--border);
    }
    .shop-card:active {
      transform: scale(0.98);
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    }

    /* 左カラー帯 */
    .card-accent {
      width: 5px;
      flex-shrink: 0;
    }

    /* カード本体 */
    .card-body {
      flex: 1;
      padding: 11px 12px 11px 13px;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    /* アイコン */
    .card-icon {
      font-size: 24px;
      flex-shrink: 0;
      line-height: 1;
    }

    /* テキスト */
    .card-text { flex: 1; min-width: 0; }
    .card-name {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-addr {
      font-size: 11px;
      color: var(--gray);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-tel {
      font-size: 11px;
      color: var(--gray);
      margin-top: 1px;
    }

    /* ジャンルバッジ */
    .card-badge {
      font-size: 10px;
      font-weight: 700;
      border-radius: 5px;
      padding: 2px 7px;
      white-space: nowrap;
      flex-shrink: 0;
      opacity: 0.85;
    }

    /* マップアイコン */
    .map-arrow {
      font-size: 18px;
      flex-shrink: 0;
      margin-right: 4px;
      opacity: 0.5;
    }

    /* 空状態 */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray);
      font-size: 14px;
    }
    .empty .emoji { font-size: 40px; margin-bottom: 10px; }

    /* ローディング */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 999;
    }
    .spinner {
      width: 38px; height: 38px;
      border: 3px solid var(--border);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 13px; color: var(--gray); }

    /* フェードイン */
    .shop-card {
      animation: fadeUp 0.2s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

let allShops = [];
let currentGenre = 'all';
let searchQuery = '';

function googleMapsUrl(shop) {
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(shop.name + ' ' + shop.address)}`;
}

function buildCard(shop, index) {
  const [accent, bg] = getColors(shop.genre);
  const icon = GENRE_ICON[shop.genre] || '🍽️';
  const card = document.createElement('a');
  card.className = 'shop-card';
  card.href = googleMapsUrl(shop);
  card.target = '_blank';
  card.rel = 'noopener noreferrer';
  card.style.animationDelay = `${Math.min(index * 30, 300)}ms`;

  card.innerHTML = `
    <div class="card-accent" style="background:${accent}"></div>
    <div class="card-body">
      <div class="card-icon">${icon}</div>
      <div class="card-text">
        <div class="card-name">${shop.name}</div>
        <div class="card-addr">📍 ${shop.address}</div>
        ${shop.tel && shop.tel !== '非公開' ? `<div class="card-tel">📞 ${shop.tel}</div>` : ''}
      </div>
      <span class="card-badge" style="color:${accent};background:${bg}">${shop.genre}</span>
      <span class="map-arrow">›</span>
    </div>
  `;
  return card;
}

function getFiltered() {
  return allShops.filter(s => {
    const genreOk = currentGenre === 'all' || s.genre === currentGenre;
    const q = searchQuery.trim();
    const searchOk = !q || s.name.includes(q) || s.address.includes(q);
    return genreOk && searchOk;
  });
}

function render() {
  const list = document.getElementById('shop-list');
  const bar = document.getElementById('result-bar');
  const filtered = getFiltered();
  list.innerHTML = '';

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty"><div class="emoji">🔍</div>該当するお店が見つかりませんでした</div>`;
    bar.textContent = '';
    return;
  }

  bar.textContent = `${filtered.length} 件表示中`;
  filtered.forEach((shop, i) => list.appendChild(buildCard(shop, i)));
}

function buildFilter(shops) {
  const genres = [...new Set(shops.map(s => s.genre))].sort();
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = '<button class="filter-btn active" data-genre="all">すべて</button>';
  genres.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.genre = g;
    btn.textContent = (GENRE_ICON[g] || '') + ' ' + g;
    bar.appendChild(btn);
  });
  bar.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    currentGenre = btn.dataset.genre;
    bar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
}

document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

async function init() {
  let shops = null;

  try {
    shops = await new Promise((resolve, reject) => {
      const cb = 'cb_' + Date.now();
      const s = document.createElement('script');
      s.src = GAS_URL + '?callback=' + cb;
      window[cb] = data => { delete window[cb]; s.remove(); resolve(data); };
      s.onerror = () => reject();
      setTimeout(() => reject(), 8000);
      document.head.appendChild(s);
    });
  } catch(e) {
    console.warn('GAS取得失敗 → フォールバックデータを使用');
    shops = FALLBACK_DATA;
  }

  allShops = shops;
  document.getElementById('total-count').textContent = shops.length + ' 店舗';
  buildFilter(shops);
  render();
  document.getElementById('loading').style.display = 'none';
}

init();
</script>
</body>
</html>
