<html lang="ja">
<head>
  <meta charset="UTF-8">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    :root {
      --primary: #E8400A;
      --primary-dark: #C03008;
      --accent: #FFB800;
      --bg: #FDF8F3;
      --surface: #FFFFFF;
      --text: #1A1208;
      --text-sub: #7A6A58;
      --border: #EDE0D0;
      --shadow: 0 2px 12px rgba(26,18,8,0.10);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ヘッダー */
    header {
      background: var(--primary);
      color: #fff;
      padding: 10px 14px 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header .logo {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.05em;
      opacity: 0.85;
      white-space: nowrap;
    }
    header h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
      line-height: 1.2;
    }
    header .count {
      margin-left: auto;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 11px;
      white-space: nowrap;
    }

    /* ジャンルフィルター */
    .filter-bar {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      overflow-x: auto;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-btn {
      background: var(--bg);
      border: 1.5px solid var(--border);
      color: var(--text-sub);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      font-family: inherit;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* メインレイアウト */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 地図 */
    #map {
      flex: 1;
      min-height: 0;
    }

    /* 下部パネル */
    .list-panel {
      background: var(--surface);
      border-top: 2px solid var(--border);
      height: 220px;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .shop-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    .shop-item:hover, .shop-item.selected {
      background: #FFF5EE;
    }
    .shop-item .genre-badge {
      font-size: 10px;
      background: var(--primary);
      color: #fff;
      border-radius: 4px;
      padding: 2px 6px;
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 44px;
      text-align: center;
    }
    .shop-item .info {
      flex: 1;
      min-width: 0;
    }
    .shop-item .name {
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .shop-item .addr {
      font-size: 11px;
      color: var(--text-sub);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .shop-item .link-btn {
      font-size: 18px;
      text-decoration: none;
      flex-shrink: 0;
      opacity: 0.7;
    }

    /* ポップアップ */
    .leaflet-popup-content-wrapper {
      border-radius: 10px;
      box-shadow: var(--shadow);
    }
    .popup-inner { min-width: 180px; }
    .popup-inner .p-genre {
      font-size: 10px;
      color: var(--primary);
      font-weight: 700;
      margin-bottom: 2px;
    }
    .popup-inner .p-name {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .popup-inner .p-addr {
      font-size: 11px;
      color: var(--text-sub);
      margin-bottom: 6px;
    }
    .popup-inner .p-links {
      display: flex;
      gap: 6px;
    }
    .popup-inner .p-links a {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      text-decoration: none;
      background: var(--primary);
      color: #fff;
    }
    .popup-inner .p-links a.map-link {
      background: #f0f0f0;
      color: var(--text);
    }

    /* ローディング */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 9999;
    }
    #loading .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 13px; color: var(--text-sub); }
  </style>
</head>

  'ラーメン':    '#E8400A',
  'カレー':      '#FFB800',
  'ハンバーガー':'#2D9E6B',
  'とんかつ':    '#9B4DCA',

  'その他':      '#888888',
};

function genreColor(genre) {
  return GENRE_COLORS[genre] || '#888888';
}

// ジャンルアイコン
const GENRE_ICONS = {
  'ラーメン':'🍜','カレー':'🍛','ハンバーガー':'🍔',
  'とんかつ':'🥩','中華料理':'🥟','タイ料理':'🍲',
  'イタリアン':'🍝','日本料理':'🍱','パン':'🥐',
  'バル':'🍷','その他':'🍽️',
};

// Geocode cache
const geoCache = {};

async function geocode(address) {
  if (geoCache[address]) return geoCache[address];
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address)}&format=json&limit=1&countrycodes=jp`;
  try {
    const res = await fetch(url, { headers: { 'Accept-Language': 'ja' } });
    const data = await res.json();
    if (data.length > 0) {
      const coord = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
      geoCache[address] = coord;
      return coord;
    }
  } catch(e) {}
  return null;
}

}).addTo(map);

  const color = genreColor(genre);

      width:30px;height:30px;
      border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);
      border:2px solid white;

}

function buildPopup(shop) {
  const mapLink = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(shop.name + ' ' + shop.address)}`;
  const urlBtn = shop.url ? `<a href="${shop.url}" target="_blank">公式サイト</a>` : '';
  return `<div class="popup-inner">
    <div class="p-genre">${GENRE_ICONS[shop.genre]||'🍽️'} ${shop.genre}</div>
    <div class="p-name">${shop.name}</div>
    <div class="p-addr">${shop.address}</div>
    ${shop.tel && shop.tel !== '非公開' ? `<div class="p-addr">📞 ${shop.tel}</div>` : ''}
    <div class="p-links">
      <a class="map-link" href="${mapLink}" target="_blank">📍 地図</a>
      ${urlBtn}
    </div>
  </div>`;
}

function renderList(shops) {
  const panel = document.getElementById('list-panel');
  panel.innerHTML = '';
  shops.forEach((shop, i) => {
    const div = document.createElement('div');
    div.className = 'shop-item' + (selectedIndex === i ? ' selected' : '');
    div.dataset.index = i;
    const color = genreColor(shop.genre);
    div.innerHTML = `
      <span class="genre-badge" style="background:${color}">${GENRE_ICONS[shop.genre]||''} ${shop.genre}</span>
      <div class="info">
        <div class="name">${shop.name}</div>
        <div class="addr">${shop.address}</div>
      </div>
      ${shop.url ? `<a class="link-btn" href="${shop.url}" target="_blank">🔗</a>` : ''}
    `;
    div.addEventListener('click', () => {
      const marker = markers[i];
      if (marker && marker._latlng) {
        map.setView(marker._latlng, 15, { animate: true });
        marker.openPopup();
        selectedIndex = i;
        renderList(getFilteredShops());
        panel.scrollTop = div.offsetTop - 60;
      }
    });
    panel.appendChild(div);
  });
}

function getFilteredShops() {
  if (currentGenre === 'all') return allShops;
  return allShops.filter(s => s.genre === currentGenre);
}

function renderFilter(shops) {
  const genres = [...new Set(shops.map(s => s.genre))].sort();
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = '<button class="filter-btn active" data-genre="all">すべて</button>';
  genres.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.genre = g;
    btn.textContent = (GENRE_ICONS[g]||'') + ' ' + g;
    bar.appendChild(btn);
  });
  bar.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentGenre = btn.dataset.genre;
      bar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyFilter();
    });
  });
}

function applyFilter() {
  const filtered = getFilteredShops();
  document.getElementById('count-badge').textContent = filtered.length + '店舗';
  markers.forEach((m, i) => {
    if (!m) return;
    const shop = allShops[i];
    if (currentGenre === 'all' || shop.genre === currentGenre) {
      m.addTo(map);
    } else {
      m.remove();
    }
  });
  selectedIndex = null;
  renderList(filtered);
}

async function loadAndRender(shops) {
  allShops = shops;
  markers = new Array(shops.length).fill(null);
  renderFilter(shops);
  document.getElementById('loading').style.display = 'none';
  document.getElementById('count-badge').textContent = shops.length + '店舗';
  renderList(shops);

  // マーカー配置（GAS座標優先 → Nominatimフォールバック）
  for (let i = 0; i < shops.length; i++) {
    const shop = shops[i];
    let coord = null;

    if (shop.lat && shop.lng) {
      // GASから座標が来ている場合はそのまま使う
      coord = { lat: shop.lat, lng: shop.lng };
    } else {
      // 座標がない場合はNominatimでジオコード
      coord = await geocode(shop.address);
      await new Promise(r => setTimeout(r, 200));
    }

    if (!coord) continue;

    const marker = L.marker([coord.lat, coord.lng], {
      icon: createMarkerIcon(shop.genre)
    }).bindPopup(buildPopup(shop));

    marker.on('click', () => {
      selectedIndex = i;
      renderList(getFilteredShops());
      const panel = document.getElementById('list-panel');
      const items = panel.querySelectorAll('.shop-item');
      const filteredShops = getFilteredShops();
      const fi = filteredShops.findIndex(s => s.name === shop.name);
      if (fi >= 0 && items[fi]) {
        panel.scrollTop = items[fi].offsetTop - 60;
      }
    });

    marker.addTo(map);
    markers[i] = marker;
  }
}

// データ取得
async function init() {
  let shops = null;

  if (GAS_URL && GAS_URL !== 'https://script.google.com/macros/s/AKfycbxNE2jrd27BdVNcSWu18WGLuUO5UxMOZS0Dwyp_6nVwdxtV-5KCvkP8UUHMR_Zj20hU/exec') {
    try {
      const res = await fetch(GAS_URL);
      shops = await res.json();
    } catch(e) {
      console.warn('GAS取得失敗、フォールバックデータを使用');
    }
  }

  if (!shops) shops = FALLBACK_DATA;
  await loadAndRender(shops);
}

init();
</script>
</body>
</html>
